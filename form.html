<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Demo</title>
  </head>
  <body>
    <h1>Form Demo</h1>
    <!-- <button>Formun Dışında</button> -->
    <!-- Form Demo Çalışması -->
    <form action="/pizza">
      <!-- <button>Sakın Gönderme!</button> -->
      <input
        type="text"
        placeholder="Kullanıcı Adı"
        id="isim"
        name="kullanıcıadı"
      />
      <label for="isim">Kullanıcı Adı:</label><br /><br />
      <label for="password">Şifrenizi giriniz</label>
      <input
        type="password"
        placeholder="Şifrenizi giriniz"
        id="password"
        name="parola"
      /><br /><br />
      <label for="email">Email Griniz</label>
      <input type="email" placeholder="Email giriniz" id="email" name="email" />
      <br /><br />
      <label for="color">Renk Seçiniz</label>
      <input type="color" id="color" name="color" /><br /><br />
      <label for="number">Sayı Griniz</label>
      <input
        type="number"
        placeholder="Sayı giriniz"
        id="number"
        name="number"
        min="5"
        max="23"
      />
      <br /><br />
      <label
        >Bilgeadam
        <input type="text" />
      </label>

      <button type="submit">Gönder!!</button>
      <!-- <button type="button">Normal Buton</button> -->
    </form>
    <hr />
    <form action="https://www.reddit.com/search">
      <input type="text" name="q" id="" placeholder="Search Reddit" />
      <button>Search Reddit</button>
    </form>
    <hr />
    <form action="https://www.google.com.tr/search">
      <input type="text" name="q" />
      <button>Search Google</button>
    </form>
    <hr />
    <form action="https://www.youtube.com/results">
      <input type="text" name="search_query" />
      <button>Search Youtube</button>
    </form>
    <br />
    <form action="/birds">
      <label for="agree">Kabul Ediyorum</label>
      <input type="checkbox" name="agree" id="agree" checked /><br /><br />
      <label for="onay">Onaylıyorum</label>
      <input type="checkbox" name="onay" id="onay" />
      <button>Gönder</button>
    </form>
    <hr />
    <form action="/kuşlar">
      <label for="birds">Martı</label>
      <input type="radio" name="birds" id="birds" value="martı" /><br />
      <label for="birds2">Kartal</label>
      <input type="radio" name="birds" id="birds2" value="kartal" /><br />
      <label for="birds3">Karga</label>
      <input type="radio" name="birds" id="birds3" value="karga" />
      <button>Yolla</button>
    </form>
    <hr />
    <form action="">
      <label for="kabul">Onaylıyorum</label>
      <input type="checkbox" id="kabul" name="boyut" /> <br />
      <label for="xs">XS</label>
      <input type="radio" name="beden" id="xs" value="xs" />
      <label for="m">M</label>
      <input type="radio" name="beden" id="m" value="m" />
      <label for="l">L</label>
      <input type="radio" name="beden" id="l" value="l" />
      <input type="submit" value="Gönder!!!" />
    </form>
    <hr />
    <!-- Dropdown açılabilir menü -->
    <form action="hayvanlar">
      <label for="hayvan">Hayvanlar</label><br />
      <select name="pets" id="hayvan">
        <option value="">Hayvanınızı seçiniz</option>
        <option value="aslan" selected>Aslan</option>
        <option value="balık">Balık</option>
        <option value="bird">Kuş</option>
      </select>
      <button>Submit</button>
    </form>
    <!-- Dropdown açılabilir menü sonu -->
    <hr />
    <!-- Range aralık çubuğu ekleme -->
    <form action="">
      <label for="range">Evdeki peynir miktarı</label>
      <input
        type="range"
        name="peynir"
        id="range"
        min="10"
        max="100"
        step="20"
        value="75"
      />
      <button>Yolla</button>
    </form>
    <hr />
    <form action="/isim">
      <label for="metin">Mesajınız</label><br />
      <textarea name="metin" id="metin" cols="20" rows="10">
Buraya Metin Griniz</textarea
      >
      <input type="submit" />
    </form>
    <hr />
    <!-- Form Doğrulama -->
    <form action="murat">
      <input
        type="text"
        placeholder="kullanıcı adı"
        required
        minlength="5"
        maxlength="10"
      />
      <input
        type="password"
        name=""
        placeholder="password"
        minlength="5"
        required
      />
      <button>Yolla</button>
    </form>
    <!-- Form Doğrulama Sonu -->
  </body>
</html>
