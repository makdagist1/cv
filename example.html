<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Examples</title>
  </head>
  <body>
    <table>
      <thead>
        <tr>
          <th>Hayvan</th>
          <th>Ortalama Kütle(kg-lb)</th>
          <th>Uçabilir</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Common Ostrich</td>
          <td>140(230)</td>
          <td>Hayır</td>
        </tr>
        <tr>
          <td>Somali Ostrich</td>
          <td>90(200)</td>
          <td>Hayır</td>
        </tr>
      </tbody>
    </table>
    <h1>Tablo V2</h1>
    <table>
      <thead>
        <tr>
          <th rowspan="2">Hayvan</th>
          <th colspan="2">Ortalama Kütle</th>
          <th rowspan="2">Uçabilir</th>
        </tr>
        <tr>
          <th>kg</th>
          <th>lb</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Common Ostrich</td>
          <td>140kg</td>
          <td>230lb</td>
          <td>Hayır</td>
        </tr>
        <tr>
          <td>Somali Ostrich</td>
          <td>90kg</td>
          <td>200lb</td>
          <td>Hayır</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
